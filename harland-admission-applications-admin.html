<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harland · Admission Applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:#0D0D0F; --ink:#1A1A1F; --slate:#4A4A56; --mist:#9A9AA8;
  --gold:#C9A84C; --gold-light:#E8C97A; --gold-dark:#A07820; --gold-pale:#F5EDDA;
  --cream:#F8F5EF; --cream-warm:#FAF7F0; --cream-deep:#F2EDE0;
  --card:#FFFEF9; --border-soft:#E8E4DC; --white:#FFFFFF;
  --success:#3B6D11; --success-wash:#EAF3DE; --error:#A32D2D; --error-wash:#FCEBEB;
  --font-display:'Cormorant Garamond',serif; --font-body:'DM Sans','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--cream); color:var(--ink); font-family:var(--font-body); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;}
.eyebrow{font-family:var(--font-body); font-size:11px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dark); margin:0;}
.btn{display:inline-block; background:var(--gold); color:var(--obsidian); font-family:var(--font-body); font-size:14px; font-weight:500; letter-spacing:0.04em; padding:12px 24px; border:none; border-radius:0; cursor:pointer; text-decoration:none;}
.btn:hover{background:var(--gold-light);}
.btn[disabled]{opacity:0.5; cursor:default;}
.btn-outline{display:inline-block; background:transparent; border:1px solid var(--border-soft); color:var(--slate); font-family:var(--font-body); font-size:13px; font-weight:500; letter-spacing:0.03em; padding:9px 16px; border-radius:0; cursor:pointer; text-decoration:none;}
.btn-outline:hover{border-color:var(--gold-dark); color:var(--gold-dark);}
input[type=text], input[type=password]{width:100%; font-family:var(--font-body); font-size:15px; color:var(--ink); background:var(--card); border:1px solid var(--border-soft); border-radius:0; padding:13px 14px; outline:none;}
input:focus{border-color:var(--gold-dark);}

/* ---------- Connect screen ---------- */
#connect{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
.connect-card{width:100%; max-width:420px; text-align:center;}
.connect-card img{height:44px; margin:0 auto 30px; display:block;}
.connect-card h1{font-family:var(--font-display); font-weight:400; font-size:32px; color:var(--obsidian); margin:0 0 8px; letter-spacing:-0.01em;}
.connect-card p.sub{font-size:14px; color:var(--slate); margin:0 0 26px;}
.connect-card .field{text-align:left; margin:0 0 18px;}
.connect-card label{display:block; font-size:12px; font-weight:500; letter-spacing:0.03em; color:var(--ink); margin:0 0 8px;}
.connect-err{display:none; font-size:13px; color:var(--error); background:var(--error-wash); border:1px solid var(--error); padding:10px 14px; margin:0 0 18px; text-align:left;}
.connect-err.show{display:block;}
.connect-note{font-size:12px; color:var(--mist); margin:20px 0 0; letter-spacing:0.02em;}

/* ---------- App shell ---------- */
#app{display:none;}
.topbar{position:sticky; top:0; z-index:10; background:var(--cream-warm); border-bottom:1px solid var(--border-soft);}
.topbar-inner{max-width:960px; margin:0 auto; padding:18px 24px; display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
.topbar img{height:32px; display:block;}
.topbar .tb-title{font-family:var(--font-display); font-size:22px; font-weight:400; color:var(--obsidian); line-height:1;}
.topbar .tb-count{font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-dark); font-weight:500;}
.topbar .tb-spacer{flex:1;}
.topbar .search{min-width:200px;}
.topbar .search input{padding:9px 13px; font-size:14px;}
.wrap{max-width:960px; margin:0 auto; padding:28px 24px 60px;}
.pii-note{font-size:12px; color:var(--mist); letter-spacing:0.03em; margin:0 0 22px;}
.loading, .empty{text-align:center; color:var(--slate); padding:60px 0; font-size:15px;}

/* ---------- Application card ---------- */
.app{background:var(--card); border:1px solid var(--border-soft); margin:0 0 20px;}
.app-head{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; padding:20px 26px; border-bottom:1px solid var(--border-soft); cursor:pointer;}
.app-head .ah-name{font-family:var(--font-display); font-size:24px; font-weight:400; color:var(--obsidian); line-height:1;}
.app-head .ah-email{font-size:13px; color:var(--slate);}
.app-head .ah-meta{margin-left:auto; font-size:12px; color:var(--mist); text-align:right; letter-spacing:0.02em;}
.app-head .ah-chev{font-family:var(--font-body); color:var(--gold-dark); font-size:12px; letter-spacing:0.08em;}
.app-body{padding:8px 26px 26px;}
.app.collapsed .app-body{display:none;}
.sec{padding:18px 0; border-top:1px solid var(--border-soft);}
.sec:first-child{border-top:none;}
.sec-label{font-family:var(--font-body); font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-dark); margin:0 0 12px;}
.kv{display:flex; gap:12px; padding:4px 0; font-size:14px;}
.kv .k{flex:0 0 150px; color:var(--slate);}
.kv .v{flex:1; color:var(--ink); word-break:break-word;}
.students{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media(max-width:640px){ .students{grid-template-columns:1fr;} .kv{flex-direction:column; gap:2px;} .kv .k{flex:none;} }
.stu{border:1px solid var(--border-soft); background:var(--cream-warm); padding:16px 18px;}
.stu .stu-name{font-family:var(--font-display); font-size:19px; color:var(--obsidian); margin:0 0 10px; font-weight:500;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{font-size:12px; letter-spacing:0.02em; color:var(--gold-dark); background:var(--gold-pale); border:1px solid var(--border-soft); padding:6px 12px;}
.acks{display:flex; flex-direction:column; gap:8px;}
.ack{display:flex; align-items:center; gap:12px; font-size:14px; color:var(--ink);}
.ack .box{flex:0 0 auto; width:18px; height:18px; border:1px solid var(--border-soft); position:relative; background:var(--white);}
.ack.yes .box{border-color:var(--gold-dark); background:var(--gold-pale);}
.ack.yes .box::after{content:""; position:absolute; left:6px; top:2px; width:4px; height:9px; border:solid var(--gold-dark); border-width:0 2px 2px 0; transform:rotate(45deg);}
.ack.no{color:var(--mist);}
.sig-wrap{border:1px solid var(--border-soft); background:var(--white); padding:14px; display:inline-block; margin-top:8px;}
.sig-wrap img{display:block; max-width:320px; max-height:130px;}
.meta-grid{display:grid; grid-template-columns:1fr 1fr; gap:4px 24px;}
@media(max-width:640px){ .meta-grid{grid-template-columns:1fr;} }
.locale-pill{display:inline-block; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--slate); border:1px solid var(--border-soft); padding:2px 8px;}
footer{border-top:1px solid var(--border-soft); text-align:center; padding:26px 0 40px; font-size:12px; color:var(--mist); letter-spacing:0.03em;}
</style>
</head>

<script>
/* ============ CONFIG ============ */
var FUNCTION_URL = "https://takuuqvpyqvomcfmcjoz.supabase.co/functions/v1/list-applications";
var LS_KEY = "harland_applications_admin_key";

/* localStorage may be unavailable in some sandboxes; fall back to memory. */
var mem = {};
function storeGet(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] || null; } }
function storeSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
function storeDel(k){ try{ localStorage.removeItem(k); }catch(e){ delete mem[k]; } }

var APPS = [];

/* ============ auth / load ============ */
function adminKey(){ return storeGet(LS_KEY) || ""; }

function connect(){
  var k = document.getElementById("adminKey").value.trim();
  if(!k){ showConnectErr("Please enter the admin key."); return; }
  storeSet(LS_KEY, k);
  loadApplications();
}
function showConnectErr(msg){
  var e=document.getElementById("connectErr"); e.textContent=msg; e.classList.add("show");
}
function showConnect(){
  document.getElementById("app").style.display="none";
  document.getElementById("connect").style.display="flex";
}
function showApp(){
  document.getElementById("connect").style.display="none";
  document.getElementById("app").style.display="block";
}
function signOut(){
  storeDel(LS_KEY);
  document.getElementById("adminKey").value="";
  document.getElementById("connectErr").classList.remove("show");
  showConnect();
}

async function loadApplications(){
  var key = adminKey();
  if(!key){ showConnect(); return; }
  showApp();
  document.getElementById("list").innerHTML = '<div class="loading">Loading applications…</div>';
  try{
    var resp = await fetch(FUNCTION_URL, { method:"GET", headers:{ "x-admin-key": key } });
    if(resp.status===401){
      storeDel(LS_KEY);
      showConnect();
      showConnectErr("That admin key was not accepted. Please check it and try again.");
      return;
    }
    if(!resp.ok) throw new Error("Server responded "+resp.status);
    var body = await resp.json();
    APPS = (body.applications || []);
    renderList();
  }catch(e){
    document.getElementById("list").innerHTML = '<div class="empty">Could not load applications. '+escapeHtml(String(e))+'</div>';
  }
}

/* ============ rendering ============ */
function escapeHtml(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fullName(o){ if(!o) return ""; return ((o.firstName||"")+" "+(o.surname||"")).trim(); }
function fmtMoney(n){ if(n==null||isNaN(n)) return ""; return "NT$"+Number(n).toLocaleString("en-US"); }
function fmtDateTime(iso){
  if(!iso) return "";
  var d=new Date(iso); if(isNaN(d.getTime())) return String(iso);
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var hh=d.getHours(), mm=(d.getMinutes()<10?"0":"")+d.getMinutes();
  var ap=hh<12?"AM":"PM"; var h12=hh%12; if(h12===0)h12=12;
  return d.getDate()+" "+mo[d.getMonth()]+" "+d.getFullYear()+", "+h12+":"+mm+" "+ap;
}
function slotLabel(v){
  var parts=String(v).split("-");
  var days={mon:"Monday",tue:"Tuesday",wed:"Wednesday",thu:"Thursday",fri:"Friday",sat:"Saturday",sun:"Sunday"};
  var pers={morning:"morning",afternoon:"afternoon",evening:"evening"};
  if(parts.length===2 && days[parts[0]] && pers[parts[1]]) return days[parts[0]]+" "+pers[parts[1]];
  return v;
}

var ACK_LABELS = {
  admissionNotGuaranteed: "Understands admission is not guaranteed",
  diagnostic48h: "Agreed to complete the diagnostic 48 hours before",
  feeTermsCredited: "Agreed to the credited fee terms",
  weeklyCap: "Understands the weekly cap and waitlist"
};

function matchesSearch(app, q){
  if(!q) return true;
  var d = app.data || {};
  var hay = [];
  if(d.parent) hay.push(fullName(d.parent));
  (d.students||[]).forEach(function(s){ hay.push(fullName(s)); });
  return hay.join(" | ").toLowerCase().indexOf(q) >= 0;
}

function renderList(){
  var q = (document.getElementById("search").value || "").trim().toLowerCase();
  var shown = APPS.filter(function(a){ return matchesSearch(a, q); });
  document.getElementById("count").textContent = q
    ? (shown.length + " of " + APPS.length)
    : (APPS.length + (APPS.length===1 ? " application" : " applications"));
  var host = document.getElementById("list");
  if(APPS.length===0){ host.innerHTML='<div class="empty">No applications yet.</div>'; return; }
  if(shown.length===0){ host.innerHTML='<div class="empty">No applications match that search.</div>'; return; }
  host.innerHTML = shown.map(renderApp).join("");
}

function renderApp(app){
  var d = app.data || {};
  var parent = d.parent || {};
  var students = d.students || [];
  var av = d.availability || {};
  var acks = d.acknowledgments || {};
  var sig = d.signature || {};

  var h = '<div class="app">';

  // header (click toggles)
  h += '<div class="app-head" onclick="this.parentNode.classList.toggle(\'collapsed\')">';
  h += '<span class="ah-name">'+escapeHtml(fullName(parent) || "(no name)")+'</span>';
  if(parent.email) h += '<span class="ah-email">'+escapeHtml(parent.email)+'</span>';
  h += '<span class="ah-meta">'+escapeHtml(fmtDateTime(app.created_at || d.submittedAt))+'<br>'+students.length+(students.length===1?" student":" students")+'</span>';
  h += '</div>';

  h += '<div class="app-body">';

  // students
  h += '<div class="sec"><p class="sec-label">Students</p><div class="students">';
  if(students.length===0){ h += '<div class="stu"><em>No students listed.</em></div>'; }
  students.forEach(function(s){
    h += '<div class="stu">';
    h += '<div class="stu-name">'+escapeHtml(fullName(s) || "(no name)")+'</div>';
    h += '<div class="chips">';
    if(s.grade) h += '<span class="chip">Grade: '+escapeHtml(s.grade)+'</span>';
    if(s.subject) h += '<span class="chip">'+escapeHtml(s.subject)+'</span>';
    h += '</div>';
    if(s.currentSchool) h += '<div class="kv" style="margin-top:10px;"><span class="k">Current school</span><span class="v">'+escapeHtml(s.currentSchool)+'</span></div>';
    if(s.futureSchool) h += '<div class="kv"><span class="k">Future school</span><span class="v">'+escapeHtml(s.futureSchool)+'</span></div>';
    if(s.goal) h += '<div class="kv"><span class="k">Goal</span><span class="v">'+escapeHtml(s.goal)+'</span></div>';
    h += '</div>';
  });
  h += '</div></div>';

  // availability
  h += '<div class="sec"><p class="sec-label">Availability</p>';
  var slots = (av.slots||[]);
  if(slots.length){
    h += '<div class="chips">'+slots.map(function(sl){ return '<span class="chip">'+escapeHtml(slotLabel(sl))+'</span>'; }).join("")+'</div>';
  } else { h += '<div class="kv"><span class="v" style="color:var(--mist);">No slots selected</span></div>'; }
  if(av.notes) h += '<div class="kv" style="margin-top:10px;"><span class="k">Notes</span><span class="v">'+escapeHtml(av.notes)+'</span></div>';
  h += '</div>';

  // fee + acknowledgments
  h += '<div class="sec"><p class="sec-label">Fee and acknowledgments</p>';
  if(d.feePerChildNTD!=null) h += '<div class="kv"><span class="k">Fee per child</span><span class="v">'+escapeHtml(fmtMoney(d.feePerChildNTD))+'</span></div>';
  h += '<div class="acks" style="margin-top:12px;">';
  Object.keys(ACK_LABELS).forEach(function(k){
    var yes = !!acks[k];
    h += '<div class="ack '+(yes?"yes":"no")+'"><span class="box"></span><span>'+escapeHtml(ACK_LABELS[k])+'</span></div>';
  });
  h += '</div></div>';

  // signature
  h += '<div class="sec"><p class="sec-label">Signature</p>';
  h += '<div class="kv"><span class="k">Signed by</span><span class="v">'+escapeHtml(sig.signedBy || "")+'</span></div>';
  if(sig.date) h += '<div class="kv"><span class="k">Date</span><span class="v">'+escapeHtml(sig.date)+'</span></div>';
  if(d.commitment24hInitials) h += '<div class="kv"><span class="k">24h commitment initials</span><span class="v">'+escapeHtml(d.commitment24hInitials)+'</span></div>';
  if(sig.imagePng && String(sig.imagePng).indexOf("data:image")===0){
    h += '<div class="sig-wrap"><img src="'+escapeHtml(sig.imagePng)+'" alt="Signature"></div>';
  } else {
    h += '<div class="kv"><span class="v" style="color:var(--mist);">No signature image</span></div>';
  }
  h += '</div>';

  // meta
  h += '<div class="sec"><p class="sec-label">Submission</p><div class="meta-grid">';
  h += '<div class="kv"><span class="k">Submitted at</span><span class="v">'+escapeHtml(fmtDateTime(d.submittedAt || app.created_at))+'</span></div>';
  h += '<div class="kv"><span class="k">Language</span><span class="v"><span class="locale-pill">'+escapeHtml(d.locale || "?")+'</span></span></div>';
  if(d.source) h += '<div class="kv"><span class="k">Source</span><span class="v">'+escapeHtml(d.source)+'</span></div>';
  h += '<div class="kv"><span class="k">Record ID</span><span class="v" style="font-size:12px; color:var(--mist);">'+escapeHtml(app.id||"")+'</span></div>';
  h += '</div></div>';

  h += '</div></div>';
  return h;
}

/* ============ init ============ */
window.addEventListener("DOMContentLoaded", function(){
  if(adminKey()){ loadApplications(); } else { showConnect(); }
});
</script>
</body>
</html>
